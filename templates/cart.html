<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
</head>
<body style="text-align:center;">
    <h1>🛒 Your Cart</h1>

    {% for item in cart %}
        <p>{{ item.name }} - ₹{{ item.price }}</p>
    {% endfor %}

    <h2>Total: ₹{{ total }}</h2>

    <a href="/order">Place Order</a>
    <br><br>
    <a href="/">Back to Menu</a>
</body>
</html>
